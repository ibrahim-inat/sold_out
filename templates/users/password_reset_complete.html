{% extends "base.html" %}

{% block title %}Şifre Sıfırlandı{% endblock %}

{% block content %}
<section class="relative min-h-[calc(100vh-4rem)] flex items-center justify-center bg-ticket-gradient-soft overflow-hidden">
  <div class="absolute top-0 right-0 w-96 h-96 rounded-full bg-primary-200/30 blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-md mx-auto px-4 py-12 animate-fade-in-up">
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-xl ring-1 ring-gray-200/60 p-8 sm:p-10 text-center">
      <span class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 text-green-600 mb-5">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </span>
      <h1 class="text-2xl font-extrabold text-gray-900 mb-2">Şifreniz Sıfırlandı!</h1>
      <p class="text-sm text-gray-500 mb-8">Yeni şifreniz başarıyla kaydedildi. Şimdi giriş yapabilirsiniz.</p>
      <a href="{% url 'users:login' %}"
         class="group inline-flex items-center gap-2 px-8 py-3.5 rounded-2xl bg-primary-700 hover:bg-primary-800 text-white font-bold shadow-ticket hover:shadow-ticket-lg transition-all duration-300 hover:-translate-y-0.5">
        Giriş Yap
        <svg class="w-5 h-5 transition-transform duration-300 group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
        </svg>
      </a>
    </div>
  </div>
</section>
{% endblock %}
