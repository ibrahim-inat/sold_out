{% extends "base.html" %}

{% block title %}Şifre Değiştirildi{% endblock %}

{% block content %}
<section class="relative min-h-[calc(100vh-4rem)] flex items-center justify-center bg-ticket-gradient-soft overflow-hidden">
  <div class="absolute top-0 right-0 w-96 h-96 rounded-full bg-primary-200/30 blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-md mx-auto px-4 py-12 animate-fade-in-up">
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-xl ring-1 ring-gray-200/60 p-8 sm:p-10 text-center">
      <span class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 text-green-600 mb-5">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
      </span>
      <h1 class="text-2xl font-extrabold text-gray-900 mb-2">Şifreniz Değiştirildi!</h1>
      <p class="text-sm text-gray-500 mb-8">Yeni şifreniz başarıyla kaydedildi.</p>
      <a href="{% url 'users:profile' %}"
         class="inline-flex items-center gap-2 px-6 py-3 rounded-2xl bg-primary-700 hover:bg-primary-800 text-white font-bold shadow-ticket hover:shadow-ticket-lg transition-all duration-300">
        Profile Dön
      </a>
    </div>
  </div>
</section>
{% endblock %}
